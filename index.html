<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drop It</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
    h1 span { color: #7c3aed; }
    p.sub { color: #888; font-size: 0.95rem; margin-bottom: 36px; }

    .drop-zone {
      width: 100%;
      max-width: 560px;
      border: 2px dashed #333;
      border-radius: 16px;
      padding: 56px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #1a1a1a;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #7c3aed; background: #1e1529; }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 2.8rem; margin-bottom: 12px; }
    .drop-zone p { color: #aaa; font-size: 0.95rem; }
    .drop-zone strong { color: #fff; }

    #results {
      width: 100%; max-width: 560px; margin-top: 28px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .card {
      background: #1a1a1a; border-radius: 14px;
      overflow: hidden; border: 1px solid #2a2a2a;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: #212121; border-bottom: 1px solid #2a2a2a;
    }
    .file-name {
      font-size: 0.9rem; font-weight: 600; color: #e0e0e0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
    }
    .file-size { font-size: 0.78rem; color: #666; flex-shrink: 0; }

    .uploading {
      padding: 18px;
      display: flex; align-items: center; gap: 12px; color: #888; font-size: 0.9rem;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #333; border-top-color: #7c3aed;
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .url-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px; background: #161616; border-bottom: 1px solid #2a2a2a;
    }
    .url-box {
      flex: 1; background: #0f0f0f; border: 1px solid #2e2e2e;
      border-radius: 8px; padding: 8px 12px; font-size: 0.82rem;
      color: #7c3aed; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: text; user-select: all;
    }
    .copy-btn {
      background: #7c3aed; color: white; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #6d28d9; }
    .copy-btn.copied { background: #16a34a; }

    .open-btn {
      display: inline-block; margin: 0 18px 14px;
      background: transparent; border: 1px solid #333;
      color: #aaa; border-radius: 8px; padding: 7px 14px;
      font-size: 0.8rem; text-decoration: none; transition: all 0.15s;
    }
    .open-btn:hover { border-color: #7c3aed; color: #7c3aed; }

    .preview-area { padding: 16px 18px; }
    .preview-label { font-size: 0.78rem; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .preview-area img { max-width: 100%; max-height: 280px; border-radius: 8px; object-fit: contain; background: #111; }
    .preview-area video, .preview-area audio { width: 100%; border-radius: 8px; margin-top: 4px; }
    .no-preview { color: #555; font-size: 0.85rem; font-style: italic; }

    .error-msg { padding: 14px 18px; color: #f87171; font-size: 0.85rem; }

    footer { margin-top: 60px; color: #333; font-size: 0.78rem; }
  </style>
</head>
<body>

  <h1>Drop <span>It</span></h1>
  <p class="sub">Upload any file — get a real live URL + preview</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" multiple />
    <div class="drop-icon">📂</div>
    <p><strong>Click to upload</strong> or drag & drop</p>
    <p>Any file — images, PDFs, videos, HTML, code…</p>
  </div>

  <div id="results"></div>

  <footer>Drop It — real URLs, instant previews</footer>

  <script>
    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const results   = document.getElementById('results');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    function handleFiles(files) { [...files].forEach(uploadFile); }

    function formatSize(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
      return (b/(1024*1024)).toFixed(2) + ' MB';
    }

    function uploadFile(file) {
      // Create card with spinner
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <span class="file-name" title="${file.name}">${file.name}</span>
          <span class="file-size">${formatSize(file.size)}</span>
        </div>
        <div class="uploading">
          <div class="spinner"></div>
          <span>Uploading and generating live URL…</span>
        </div>
      `;
      results.prepend(card);

      // Upload to 0x0.st — a real no-signup file host
      const formData = new FormData();
      formData.append('file', file);

      fetch('https://0x0.st', { method: 'POST', body: formData })
        .then(r => {
          if (!r.ok) throw new Error('Upload failed: ' + r.status);
          return r.text();
        })
        .then(url => {
          url = url.trim();
          showResult(card, file, url);
        })
        .catch(err => {
          // Fallback: try file.io
          const fd2 = new FormData();
          fd2.append('file', file);
          return fetch('https://file.io/?expires=1d', { method: 'POST', body: fd2 })
            .then(r => r.json())
            .then(data => {
              if (data.success && data.link) {
                showResult(card, file, data.link);
              } else {
                throw new Error('file.io failed');
              }
            });
        })
        .catch(err => {
          card.querySelector('.uploading').outerHTML = `<div class="error-msg">❌ Upload failed. Try a smaller file or check your connection.</div>`;
        });
    }

    function showResult(card, file, url) {
      const type = file.type;
      let previewHTML = '';

      if (type.startsWith('image/')) {
        previewHTML = `<img src="${url}" alt="${file.name}" crossorigin="anonymous" />`;
      } else if (type.startsWith('video/')) {
        previewHTML = `<video controls src="${url}"></video>`;
      } else if (type.startsWith('audio/')) {
        previewHTML = `<audio controls src="${url}"></audio>`;
      } else {
        previewHTML = `<p class="no-preview">File uploaded — open the URL to view it.</p>`;
      }

      const uploading = card.querySelector('.uploading');
      uploading.outerHTML = `
        <div class="url-row">
          <div class="url-box" title="${url}">${url}</div>
          <button class="copy-btn" onclick="copyURL(this, '${url}')">Copy</button>
        </div>
        <a class="open-btn" href="${url}" target="_blank" rel="noopener">↗ Open URL</a>
        <div class="preview-area">
          <p class="preview-label">Preview</p>
          ${previewHTML}
        </div>
      `;
    }

    function copyURL(btn, url) {
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }
  </script>
</body>
</html>
